<!DOCTYPE html>
<html>
<head>
  <title>Watch Movie</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }

    .container {
      padding: 15px;
    }

    video {
      width: 100%;
      max-height: 60vh;
    }

    /* DETAILS LAYOUT */
    .details-wrapper {
      display: flex;
      gap: 15px;
      margin-top: 15px;
      align-items: flex-start;
    }

    /* POSTER */
    .poster img {
      width: 150px;
      border-radius: 6px;
    }

    /* TEXT DETAILS */
    .details {
      font-size: 14px;
    }

    .details p {
      margin: 6px 0;
      line-height: 1.4;
    }

    .label {
      color: #1cda6b;
      font-weight: bold;
    }

    .back {
      margin-top: 15px;
      color: #1cda6b;
      cursor: pointer;
      display: inline-block;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      .details-wrapper {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .poster img {
        width: 120px;
      }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- TITLE -->
  <h2 id="title"></h2>

  <!-- VIDEO -->
  <video id="player" controls autoplay>
    <source id="source" src="" type="video/mp4">
  </video>

  <!-- DETAILS SECTION -->
  <div class="details-wrapper">

    <!-- LEFT POSTER -->
    <div class="poster">
      <img id="posterImg" src="" alt="Movie Poster">
    </div>

    <!-- RIGHT DETAILS -->
    <div class="details">
      <p><span class="label">Description:</span> <span id="desc"></span></p>
      <p><span class="label">Director:</span> <span id="director"></span></p>
      <p><span class="label">Year:</span> <span id="year"></span></p>
      <p><span class="label">Genre:</span> <span id="genre"></span></p>
    </div>

  </div>

  <!-- BACK -->
  <div class="back" onclick="history.back()">⬅ Back to Home</div>

</div>

<script>
  const params = new URLSearchParams(window.location.search);

  document.getElementById("title").innerText = params.get("title");
  document.getElementById("source").src = params.get("video");
  document.getElementById("posterImg").src = params.get("thumb");

  document.getElementById("desc").innerText = params.get("desc");
  document.getElementById("director").innerText = params.get("director");
  document.getElementById("year").innerText = params.get("year");
  document.getElementById("genre").innerText = params.get("genre");

  document.getElementById("player").load();
</script>

</body>
</html>
